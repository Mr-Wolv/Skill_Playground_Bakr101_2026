# Matrix Build Workflow
# Builds and tests the application across multiple OS and language versions,
# then uploads build artifacts for each combination.
# Place this file at: .github/workflows/matrix-build.yml
name: Matrix Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install build

      - name: Build distribution packages
        run: python -m build

      - name: Run tests
        run: pytest -q

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*
          retention-days: 14
          if-no-files-found: error

  # Collect the per-matrix artifacts into a single downloadable bundle for
  # release jobs or manual inspection.
  collect:
    name: Collect artifacts
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-dist
          pattern: dist-*
          merge-multiple: true

      - name: List collected artifacts
        run: ls -R all-dist

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: all-dist
          path: all-dist/*
          retention-days: 14
