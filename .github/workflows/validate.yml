name: Validate Catalog

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate catalog coherence
        run: python scripts/validate_catalog.py

  # Belt-and-suspenders for the merged-store (oscillation-nuke) invariant.
  # check_merged_topology.py self-skips on GitHub Actions (where the Windows
  # junction does not exist and the merged invariant is NOT expected); CI stays
  # the independent auditor. On THIS machine (local catalog present, not CI) it
  # asserts B == C and FAILS loudly if a future change ever splits them again.
  merged-store-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Assert merged store (B == C)
        run: python scripts/check_merged_topology.py
